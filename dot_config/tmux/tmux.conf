# Reduce escape-time for SSH+VS Code compatibility
set -s escape-time 10
set-option -g detach-on-destroy off
set -g mouse on
setw -g mode-keys vi
set -g history-limit 500
set -g status-interval 5
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'timvw/tmux-assistant-resurrect'
set -g @plugin 'niqodea/tmux-matryoshka'

# Catppuccin theme (must be after other plugins, before TPM run)
set -g @catppuccin_flavor 'mocha'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_status_modules_right "application session date_time"
set -g @catppuccin_date_time_text "%H:%M %d/%m"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"

# Smart window names: idle shell → dir, running command → cmd:dir
set-option -g automatic-rename on
set-option -g automatic-rename-format "#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}:#{b:pane_current_path}}"
set-option -g allow-rename off

run '~/.tmux/plugins/tpm/tpm'

# Dynamic Claude status (appended after catppuccin renders)
set -ga status-right "#[fg=#cba6f7,bg=default] #(cat ~/.tmux-status-#{pane_id} 2>/dev/null)"

# Auto-restore on session creation (handles SLURM restarts + fresh boot)
set-hook -g session-created 'run-shell -b "sleep 3 && ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh"'
