# Reduce escape-time for SSH+VS Code compatibility
set -s escape-time 10
set-option -g detach-on-destroy off
set -g mouse on
setw -g mode-keys vi
set -g history-limit 500
set -g status-interval 5
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'timvw/tmux-assistant-resurrect'
set -g @plugin 'niqodea/tmux-matryoshka'

# tmux-assistant-resurrect: the save/restore hooks run in the tmux SERVER
# environment, which lacks the TMUX_ASSISTANT_RESURRECT_DIR / XDG_RUNTIME_DIR
# that Claude's session-track hook uses (it runs in Claude's own env). Without
# this, save reads an empty state dir and captures no session IDs, so restore
# resurrects plain shells instead of resuming sessions. Pin the dir into the
# server's global env so both halves agree. tmux does NOT expand $HOME here, so
# use an absolute path. Must match XDG_RUNTIME_DIR (~/xdg-runtime) in the shell.
set-environment -g TMUX_ASSISTANT_RESURRECT_DIR "/Users/craig.russell/xdg-runtime/tmux-assistant-resurrect"

# Catppuccin theme (must be after other plugins, before TPM run)
set -g @catppuccin_flavor 'mocha'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_status_modules_right "application session date_time"
set -g @catppuccin_date_time_text "%H:%M %d/%m"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"

# Stable window names: NEVER auto-rename, regardless of foreground command or escape sequences.
# Window names only change via explicit manual rename (`prefix ,`) or the Claude
# SessionStart hook in ~/.claude/settings.json (renames to basename($PWD) on launch).
# Hooks below also defend against tmux-resurrect re-enabling per-window auto-rename.
set-option -g automatic-rename off
set-option -g allow-rename off

# Defensively unset per-window automatic-rename whenever a window appears.
# tmux-resurrect's restore.sh sets this option per-window from saved state,
# and a per-window option overrides the global `automatic-rename off` above.
set-hook -g after-new-window 'set-window-option automatic-rename off'
set-hook -g window-linked    'set-window-option automatic-rename off'

run '~/.tmux/plugins/tpm/tpm'

# Dynamic window tabs: show repo:branch from pane's git context.
set -g window-status-current-format "#[fg=#11111b,bg=#{@thm_mauve}] #(~/.claude/scripts/tmux-window-context.sh #{pane_current_path}) "
set -g window-status-format "#[fg=#cdd6f4,bg=#{@thm_surface_0}] #(~/.claude/scripts/tmux-window-context.sh #{pane_current_path}) "

# Sidebar (left pane: window tree + claude/branch indicators) and Claude
# session fork. See ~/.tmux/scripts/sidebar*.sh and fork-claude.sh.
# `prefix f` overrides the default `find-window` (still reachable via
# `prefix : find-window`).
bind-key b run-shell "~/.tmux/scripts/sidebar-toggle.sh"
bind-key f run-shell "~/.tmux/scripts/fork-claude.sh"

# Dynamic Claude status (appended after catppuccin renders)
set -ga status-right "#[fg=#cba6f7,bg=default] #(cat ~/.tmux-status-#{pane_id} 2>/dev/null)"

# Auto-restore on session creation (handles SLURM restarts + fresh boot)
set-hook -g session-created 'run-shell -b "~/.tmux/resurrect-guard.sh"'
# Re-assert per-window auto-rename=off across all windows AFTER resurrect restores
# (resurrect-guard.sh sleeps 3s then restores; we sleep 5s to land last).
set-hook -ga session-created 'run-shell -b "sleep 5 && tmux list-windows -a -F \"##{session_name}:##{window_index}\" | xargs -I{} tmux set-window-option -t {} automatic-rename off"'
