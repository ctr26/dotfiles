# Address vim mode switching delay (http://superuser.com/a/252717/65504)
# This is needed for SSH+VSCODE
set -s escape-time 10
# https://unix.stackexchange.com/questions/121527/when-exiting-the-last-terminal-in-a-tmux-session-can-it-switch-to-another
set-option -g detach-on-destroy off
set -g mouse on
setw -g mode-keys vi

# Status bar at the top
set -g status-position top

# Tree view of all sessions/windows/panes (prefix + T)
bind T choose-tree -Zs

# Refresh status bar every 5 seconds (for dynamic updates)
set -g status-interval 5

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# Problems with this plugin
# set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @plugin 'catppuccin/tmux'

# Status bar right: session + date/time + dynamic Claude status
set -g @catppuccin_status_modules_right "application session date_time"
set -g @catppuccin_date_time_text "%H:%M %d/%m"

# Window tabs: show #W (set by automatic-rename-format)
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"

# Show sensible window names in bottom bar
# - Idle shell: directory basename (e.g. "projects", "openclaw")
# - Running command: command:dir (e.g. "claude:research", "vim:hooke")
set-option -g automatic-rename on
set-option -g automatic-rename-format "#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}:#{b:pane_current_path}}"
set-option -g allow-rename off

run '~/.tmux/plugins/tpm/tpm'

# Dynamic Claude/OpenClaw status (appended after catppuccin renders)
# Per-pane status files prevent multiple agents clobbering each other
# Write from hooks/agents: echo "status" > ~/.tmux-status-$(tmux display -p '#{pane_id}')
set -ga status-right "#[fg=#cba6f7,bg=default] #(cat ~/.tmux-status-#{pane_id} 2>/dev/null)"
